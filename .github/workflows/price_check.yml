name: PS5 Price Tracker

on:
  schedule:
    - cron: "*/5 * * * *"   # Every 5 minutes
  workflow_dispatch:         # Allow manual trigger from GitHub UI

# Minimal permissions — write only needed to commit state.json
permissions:
  contents: write

jobs:
  check-price:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repo
        # SECURITY: Pinned to exact SHA, not just tag (tags can be moved)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4  # v4.2.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FLIPKART_URL: ${{ secrets.FLIPKART_URL }}
        run: python tracker.py

      - name: Commit state if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --staged --quiet; then
            echo "No state change, skipping commit."
          else
            git commit -m "chore: update tracker state [skip ci]"
            git push
          fi
